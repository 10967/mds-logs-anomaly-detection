version: "3.9"

networks:
  mds-net:
    driver: bridge

volumes:
  postgres_data:
  airflow_logs:

services:

  postgres:
    image: postgres:15
    container_name: mds-postgres
    environment:
      POSTGRES_USER: mdsuser
      POSTGRES_PASSWORD: mdspassword
      POSTGRES_DB: logs_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - mds-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mdsuser -d logs_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  airflow-webserver:
    image: apache/airflow:2.8.0
    container_name: mds-airflow-webserver
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://mdsuser:mdspassword@postgres:5432/logs_db
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__FERNET_KEY=ZmDfcTF7_60GrrY167zsiPd67pEvs0aGOv2oasOM1Pg=
      - AIRFLOW__WEBSERVER__EXPOSE_CONFIG=True
    ports:
      - "8082:8080"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../airflow/dags:/opt/airflow/dags
      - ../data:/opt/airflow/data
      - airflow_logs:/opt/airflow/logs
    networks:
      - mds-net
    restart: unless-stopped
    command: webserver

  airflow-scheduler:
    image: apache/airflow:2.8.0
    container_name: mds-airflow-scheduler
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://mdsuser:mdspassword@postgres:5432/logs_db
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__FERNET_KEY=ZmDfcTF7_60GrrY167zsiPd67pEvs0aGOv2oasOM1Pg=
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../airflow/dags:/opt/airflow/dags
      - ../data:/opt/airflow/data
      - airflow_logs:/opt/airflow/logs
    networks:
      - mds-net
    restart: unless-stopped
    command: scheduler

  spark:
    image: spark:3.5.0
    container_name: mds-spark
    environment:
      - SPARK_MODE=master
    ports:
      - "8083:8080"
      - "7077:7077"
    volumes:
      - ../spark:/opt/spark-apps
      - ../data:/opt/spark-data
    networks:
      - mds-net
    restart: unless-stopped
    entrypoint: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.master.Master"]
    entrypoint: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.master.Master"]


